<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Manage Your Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
            max-width: 600px;
            width: 100%;
            animation: fadeIn 0.8s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            text-align: center;
            color: #333;
            font-weight: 600;
            margin-bottom: 15px;
        }
        h2 {
            color: #555;
            font-size: 18px;
            margin-top: 20px;
            border-bottom: 2px solid #764ba2;
            padding-bottom: 5px;
        }
        .flash-message {
            background: #ffdb99;
            color: #9b5e00;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
        }
        label {
            font-weight: 600;
            display: block;
            margin-top: 10px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            transition: 0.3s;
            font-size: 14px;
        }
        input:focus, textarea:focus {
            border-color: #764ba2;
            outline: none;
            box-shadow: 0 0 5px rgba(118, 75, 162, 0.5);
        }
        .role-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .role-option {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            background: #667eea;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s ease-in-out;
        }
        button:hover {
            background: #564ab1;
        }
        .delete-btn {
            background: red;
        }
        .delete-btn:hover {
            background: darkred;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Profile</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="flash-message">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('profile') }}">


            <h2>Personal Information</h2>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" value="{{ user.username or '' }}" required>

            <label for="full_name">Full Name:</label>
            <input type="text" id="full_name" name="full_name" value="{{ user.full_name or '' }}" required>

            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob" value="{{ user.dob or '' }}">

            <label for="bio">Bio / Summary:</label>
            <textarea id="bio" name="bio" rows="3">{{ user.bio or '' }}</textarea>

            <h2>Account Security</h2>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="{{ user.email or '' }}" required>

            <label for="password">Password (leave blank to keep unchanged):</label>
            <input type="password" id="password" name="password">

            <h2>Contact Information</h2>
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" value="{{ user.phone or '' }}">

            <label for="address">Address:</label>
            <input type="text" id="address" name="address" value="{{ user.address or '' }}">

                 <h2>Account Type</h2>
            <div class="role-group">
                <div class="role-option">
                    <input type="radio" id="patient" name="role" value="patient"
                           {% if user.role == 'patient' %}checked{% endif %}>
                    <label for="patient">Patient</label>
                </div>

                <div class="role-option">
                    <input type="radio" id="therapist" name="role" value="therapist"
                           {% if user.role == 'therapist' %}checked{% endif %}>
                    <label for="therapist">Therapist</label>
                </div>
            </div>

            <button type="submit">Update Profile</button>
        </form>

        <form method="POST" action="{{ url_for('delete_account') }}"
              onsubmit="return confirm('Are you sure you want to delete your account? This cannot be undone.');">
            <button type="submit" class="delete-btn">Delete Account</button>
        </form>
    </div>
</body>
</html>
